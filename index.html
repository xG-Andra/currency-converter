<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Currency Converter</h1>
    
    <div class="currency-container">
      <div class="currency-select-container">
        <input type="text" id="currency-first" class="currency-input" value="USD" autocomplete="off" placeholder="Cari mata uang...">
        <ul id="options-first" class="currency-options"></ul>
      </div>
      <input type="number" id="worth-first" value="1" min="0" />
    </div>
    
    <div class="currency-container">
      <div class="currency-select-container">
        <input type="text" id="currency-second" class="currency-input" value="IDR" autocomplete="off" placeholder="Cari mata uang...">
        <ul id="options-second" class="currency-options"></ul>
      </div>
      <input type="text" id="worth-second" readonly placeholder="Hasil konversi">
    </div>
    
    <p class="exchange-rate" id="exchange-rate">1 USD = </p>
  </div>

  <script src="index.js"></script>
</body>
</html>
